server:
  port: 8080

spring:
  application:
    name: fire-safety-platform
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/fire_safety?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:fire_safety}
    password: ${DB_PASSWORD:fire_safety}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

app:
  session:
    access-ttl: ${ACCESS_TOKEN_TTL:2h}
    refresh-ttl: ${REFRESH_TOKEN_TTL:30d}
  storage:
    local-root: ${FILE_STORAGE_ROOT:./data/files}
  wechat:
    app-id: ${WECHAT_APP_ID:}
    app-secret: ${WECHAT_APP_SECRET:}
    mock-enabled: ${WECHAT_MOCK_ENABLED:false}
  bootstrap-admin:
    username: ${BOOTSTRAP_ADMIN_USERNAME:}
    password: ${BOOTSTRAP_ADMIN_PASSWORD:}
    display-name: ${BOOTSTRAP_ADMIN_DISPLAY_NAME:系统管理员}

management:
  endpoints:
    web:
      exposure:
        include: health,info
