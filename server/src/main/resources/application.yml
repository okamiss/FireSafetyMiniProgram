server:
  port: 8080

spring:
  application:
    name: fire-safety-platform
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/fire_safety?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:fire_safety}
    password: ${DB_PASSWORD:fire_safety}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
