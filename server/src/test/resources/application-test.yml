spring:
  datasource:
    url: jdbc:h2:mem:fire_safety_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

app:
  storage:
    local-root: ${java.io.tmpdir}/fire-safety-test-files
